<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="علب هارد كفر الرياض, علب فاخرة, علب هدايا, علب منتجات, طباعة علب, عنوان الطباعة">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://printadd.sa/hardcover-boxes.html">
    <meta property="og:title" content="علب هارد كفر فاخرة | عنوان الطباعة">
    <meta property="og:description" content="شاهد نماذج علب الهارد كفر الفاخرة بتصاميم ومقاسات متنوعة.">
    <meta property="og:image" content="https://printadd.sa/images/portfolio-hardcover-boxes.jpg">
    <link rel="canonical" href="https://printadd.sa/hardcover-boxes.html">
    <link rel="alternate" hreflang="ar-SA" href="https://printadd.sa/hardcover-boxes.html">
    <link rel="alternate" hreflang="en-SA" href="https://printadd.sa/hardcover-boxes.html">
    <title>علب هارد كفر فاخرة في الرياض | عنوان الطباعة</title>
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="gallery-page-header">
        <div class="container gallery-page-nav">
            <a href="index.html#portfolio" class="gallery-back-link">
                <i class="fas fa-arrow-right"></i>
                <span>العودة للأعمال</span>
            </a>
            <a href="index.html" class="gallery-page-logo">
                <img src="images/logo.png" alt="شعار عنوان الطباعة">
            </a>
        </div>
    </header>

    <main>
        <section class="gallery-page-hero">
            <div class="container gallery-page-hero-grid">
                <div class="gallery-page-copy">
                    <span class="section-badge">علب فاخرة</span>
                    <h1>علب هارد كفر فاخرة في الرياض</h1>
                    <p>نماذج متنوعة من علب الهارد كفر للمنتجات والهدايا والمناسبات، بتشطيبات مخصصة ومقاسات تناسب هوية كل مشروع.</p>
                    <a href="index.html#contact" class="btn btn-primary">
                        <span>اطلب تنفيذ مشابه</span>
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
                <img src="images/portfolio-hardcover-boxes.jpg" alt="علب هارد كفر فاخرة بتصميم مخصص في الرياض" class="gallery-page-cover">
            </div>
        </section>

        <section class="gallery-page-section">
            <div class="container">
                <div class="gallery-page-title">
                    <h2>معرض الصور</h2>
                    <p>اضغط على أي صورة لفتحها بالحجم الكامل.</p>
                </div>
                <div class="hardcover-gallery-grid" id="hardcoverGallery"></div>
            </div>
        </section>
    </main>

    <a href="https://wa.me/966501200001" class="whatsapp-float" target="_blank" rel="noopener" aria-label="تواصل عبر واتساب">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const gallery = document.getElementById('hardcoverGallery');
        const totalImages = 336;
        const imagePath = (index) => `images/hardcover-boxes-optimized/hardcover-boxes-riyadh-${String(index).padStart(3, '0')}.jpg`;
        const leatherBoxGroups = [
            { prefix: 'علب-جلد-فاخر-للهدايا', count: 10, alt: 'علب جلد فاخر للهدايا' },
            { prefix: 'علب-هارد-كفر-جلد', count: 10, alt: 'علب هارد كفر جلد' },
            { prefix: 'علب-فاخرة-جلدية-للمنتجات', count: 10, alt: 'علب فاخرة جلدية للمنتجات' },
            { prefix: 'علب-تغليف-جلد-فاخر', count: 10, alt: 'علب تغليف جلد فاخر' },
            { prefix: 'علب-هدايا-جلد-فاخرة', count: 10, alt: 'علب هدايا جلد فاخرة' },
            { prefix: 'علب-جلد-مخصصة-بالشعار', count: 10, alt: 'علب جلد مخصصة بالشعار' },
            { prefix: 'علب-فاخرة-للعطور-والهدايا', count: 10, alt: 'علب فاخرة للعطور والهدايا' },
            { prefix: 'علب-جلد-اسود-فاخر', count: 10, alt: 'علب جلد اسود فاخر' },
            { prefix: 'علب-جلد-بتصميم-ملكي', count: 8, alt: 'علب جلد بتصميم ملكي' },
            { prefix: 'علب-هاردكفر-فاخرة-جلد', count: 8, alt: 'علب هاردكفر فاخرة جلد' },
            { prefix: 'علب-جلد-للشركات', count: 8, alt: 'علب جلد للشركات' },
            { prefix: 'علب-فاخرة-طباعة-وتغليف', count: 7, alt: 'علب فاخرة طباعة وتغليف' }
        ];

        function appendGalleryImage(src, alt, loading = 'lazy') {
            const link = document.createElement('a');
            link.href = src;
            link.className = 'hardcover-gallery-item';
            link.target = '_blank';
            link.rel = 'noopener';

            const img = document.createElement('img');
            img.src = src;
            img.alt = alt;
            img.loading = loading;

            link.appendChild(img);
            gallery.appendChild(link);
        }

        for (let index = 1; index <= totalImages; index += 1) {
            appendGalleryImage(
                imagePath(index),
                `علب هارد كفر فاخرة في الرياض - نموذج ${index}`,
                index <= 8 ? 'eager' : 'lazy'
            );
        }

        leatherBoxGroups.forEach((group) => {
            for (let index = 1; index <= group.count; index += 1) {
                const paddedIndex = String(index).padStart(3, '0');
                appendGalleryImage(
                    `images/hardcover-boxes-optimized/${group.prefix}-${paddedIndex}.jpg`,
                    `${group.alt} في الرياض - نموذج ${index}`
                );
            }
        });
    </script>
</body>
</html>
